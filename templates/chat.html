<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="chat-container">

        <div class="chat-header">
            <h2>🏥 Medical Chatbot</h2>
            <p>Ask me anything about medical topics</p>
        </div>

        <!-- Messages Box -->
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">
                <span>Hello! Main aapka Medical Assistant hoon. Koi bhi medical sawal poochein!</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input
                type="text"
                id="user-input"
                placeholder="Apna sawal yahan likhein..."
                onkeypress="handleKeyPress(event)"
                autocomplete="off"
            />
            <button onclick="sendMessage()" id="send-btn">Send</button>
        </div>

    </div>

    <script>
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        function sendMessage() {
            const userInput = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const msg = userInput.value.trim();

            if (msg === "") return;

            const userDiv = document.createElement("div");
            userDiv.classList.add("message", "user-message");
            userDiv.innerHTML = `<span>${msg}</span>`;
            chatBox.appendChild(userDiv);

            userInput.value = "";

            const typingDiv = document.createElement("div");
            typingDiv.classList.add("message", "bot-message", "typing");
            typingDiv.id = "typing-indicator";
            typingDiv.innerHTML = `<span>⏳ Soch raha hai...</span>`;
            chatBox.appendChild(typingDiv);

            chatBox.scrollTop = chatBox.scrollHeight;

            fetch("/get", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                },
                body: `msg=${encodeURIComponent(msg)}`
            })
            .then(response => response.text())
            .then(data => {

                const typing = document.getElementById("typing-indicator");
                if (typing) typing.remove();

                const botDiv = document.createElement("div");
                botDiv.classList.add("message", "bot-message");
                botDiv.innerHTML = `<span>🤖 ${data}</span>`;
                chatBox.appendChild(botDiv);

                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(error => {
                const typing = document.getElementById("typing-indicator");
                if (typing) typing.remove();

                const errorDiv = document.createElement("div");
                errorDiv.classList.add("message", "bot-message", "error");
                errorDiv.innerHTML = `<span>❌ Kuch error aa gaya, dobara koshish karein.</span>`;
                chatBox.appendChild(errorDiv);

                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
    </script>

</body>
</html>
